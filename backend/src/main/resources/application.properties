# ============================================
# AI Code Review Assistant - application.properties
# Copy this to application-local.properties (gitignored) and fill real secrets,
# or supply the values below as environment variables in production.
# ============================================

spring.application.name=ai-code-review-assistant
server.port=${PORT:8080}

# ---------- Database (PostgreSQL / Supabase) ----------
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/codereview_db}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.open-in-view=false

# ---------- File upload ----------
spring.servlet.multipart.max-file-size=25MB
spring.servlet.multipart.max-request-size=25MB
app.storage.upload-dir=./uploads
app.storage.report-dir=./reports

# ---------- JWT ----------
# 256-bit (32+ char) secret required for HS256. CHANGE THIS in production via env var.
app.jwt.secret=${JWT_SECRET}
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

# ---------- OpenAI / LLM ----------
huggingface.api-key=${HUGGINGFACE_API_KEY}

huggingface.base-url=https://router.huggingface.co/v1

huggingface.model=deepseek-ai/DeepSeek-R1:fastest

# ---------- CORS ----------
app.cors.allowed-origins=${CORS_ORIGINS:http://localhost:3000}

# ---------- Logging ----------
logging.level.com.astra.codereview=INFO
logging.level.org.springframework.security=WARN
